<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hitung Mundur Ultah Aura</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <!-- <link rel="stylesheet" href="assets/simplyCountdown/themes/default.css">
    <link rel="stylesheet" href="assets/simplyCountdown/themes/dark.css">
    <link rel="stylesheet" href="assets/simplyCountdown/themes/cyber.css">
    <link rel="stylesheet" href="assets/simplyCountdown/themes/losange.css">
    <link rel="stylesheet" href="assets/simplyCountdown/themes/circle.css"> -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div
      class="hero is-flex is-justify-content-center is-align-items-center has-text-centered"
      id="divHitung"
    >
      <div class="content p-6">
        <img src="assets/logoUltah.png" alt="" class="gambar">
        <h3 class="my-0 teks">COUNTDOWN TO ULTAH</h3>
        <h1 class="my-1 teks">AURA</h1>
        <div
          class="my-countdown custom-countdown-theme mt-4 is-flex is-justify-content-space-evenly"
        ></div>
      </div>
    </div>

    <script src="assets/simplyCountdown/simplyCountdown.umd.js"></script>
    <script>
      //   simplyCountdown('.my-countdown', {
      //     year: 2026,
      //     month: 8,
      //     day: 12
      // });

      simplyCountdown(".my-countdown", {
        year: 2026, // Target year (required)
        month: 8, // Target month [1-12] (required)
        day: 12, // Target day [1-31] (required)
        hours: 0, // Target hour [0-23], default: 0
        minutes: 0, // Target minute [0-59], default: 0
        seconds: 0,
        words: {
          // Custom labels, with lambda for plurals
          days: {
            root: " Hari",
            lambda: (root, n) => (n > 1 ? root + "" : root),
          },
          hours: {
            root: " Jam",
            lambda: (root, n) => (n > 1 ? root + "" : root),
          },
          minutes: {
            root: " Menit",
            lambda: (root, n) => (n > 1 ? root + "" : root),
          },
          seconds: {
            root: " Detik",
            lambda: (root, n) => (n > 1 ? root + "" : root),
          },
        },
        plural: false, // Use plurals for labels
        inline: false, // Inline format: e.g., "24 days, 4 hours, 2 minutes"
        inlineSeparator: ", ", // Separator for inline format, default: ", "
        inlineClass: "custom-countdown-theme", // CSS class for inline countdown
        enableUtc: false, // Use UTC time if true
        refresh: 1000, // Refresh interval in ms, default: 1000
        sectionClass: "simply-section", // CSS class for each countdown section
        amountClass: "simply-amount", // CSS class for numeric values
        wordClass: "simply-word", // CSS class for unit labels
        zeroPad: false, // Pad numbers with leading zero
        removeZeroUnits: false, // Remove units with zero value
        countUp: false, // Count up after reaching zero
        onEnd: () => {window.location.href = "ucapanSelamat.html";}// Callback when countdown ends
      });


      

      
    </script>
  </body>
</html>
